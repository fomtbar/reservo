services:
  db:
    image: postgres:16-alpine
    container_name: reservo-db
    env_file: .env.prod
    volumes:
      - reservo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: reservo-redis
    volumes:
      - reservo_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: reservo-api
    env_file: .env.prod
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MP_SANDBOX: "false"
    container_name: reservo-web
    env_file: .env.prod
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

networks:
  default:
    name: reservo-prod

volumes:
  reservo_pgdata:
    name: reservo_pgdata
  reservo_redis:
    name: reservo_redis
